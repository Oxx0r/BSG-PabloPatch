name: Build Mod Installer

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-sfx:
    runs-on: windows-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Get Version from Tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update Config with Version
        shell: bash
        run: |
          # Ersetzt {{VERSION}} in der sfx_config.txt
          sed -i "s/{{VERSION}}/${{ steps.get_version.outputs.VERSION }}/g" sfx_config.txt

      - name: Create Archive and SFX
        shell: pwsh
        run: |
          # 1. Daten packen (Ordner Mods ohne tmp)
          7z a "mod_data.7z" "./Mods" -xr!tmp

          # 2. SFX Modul finden oder extrahieren
          # Wir suchen im Standard-Pfad nach 7z.sfx
          $sfxPath = "C:\Program Files\7-Zip\7z.sfx"
          
          if (-not (Test-Path $sfxPath)) {
              Write-Host "7z.sfx nicht gefunden, versuche Alternative..."
              $sfxPath = "C:\Program Files\7-Zip\7zCon.sfx" # Konsolen-Alternative
          }

          # 3. EXE zusammenbauen
          $fileName = "BSG_Pablo_Patch_${{ steps.get_version.outputs.VERSION }}.exe"
          
          # Der binäre Copy-Befehl
          & cmd.exe /c "copy /b `"$sfxPath`" + sfx_config.txt + mod_data.7z $fileName"
          
          if (Test-Path $fileName) {
              echo "FINAL_EXE=$fileName" >> $env:GITHUB_ENV
          } else {
              Write-Error "EXE wurde nicht erstellt!"
              exit 1
          }

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.FINAL_EXE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}