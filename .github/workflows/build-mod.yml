name: Build Mod Installer

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-sfx:
    runs-on: windows-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Get Version from Tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Archive and EXE
        shell: pwsh
        run: |
          # 1. Platzhalter in Config ersetzen
          $ver = "${{ steps.get_version.outputs.VERSION }}"
          (Get-Content sfx_config.txt) -replace '{{VERSION}}', $ver | Set-Content sfx_config.txt

          # 2. Daten packen
          7z a "mod_data.7z" "./Mods" -xr!tmp

          # 3. Das eingebaute SFX Modul nutzen
          # Wir suchen es direkt im Programme-Ordner
          $sfx = "C:\Program Files\7-Zip\7z.sfx"
          $out = "BSG_Pablo_Patch_$ver.exe"

          # 4. Binary Copy (Modul + Config + Daten)
          & cmd.exe /c "copy /b `"$sfx`" + sfx_config.txt + mod_data.7z `"$out`""
          
          echo "FINAL_EXE=$out" >> $env:GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.FINAL_EXE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}