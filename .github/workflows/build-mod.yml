name: Build Mod Installer

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-sfx:
    runs-on: windows-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Get Version from Tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Archive and EXE
        shell: pwsh
        run: |
          $ver = "${{ steps.get_version.outputs.VERSION }}"
          
          # Sicherstellen, dass die Datei wirklich UTF8 ohne BOM ist und Version einsetzen
          $content = Get-Content sfx_config.txt -Raw
          $content = $content -replace '{{VERSION}}', $ver
          # Wir schreiben sie neu, um sicher zu sein:
          [System.IO.File]::WriteAllText("$(Get-Location)\sfx_fixed.txt", $content, (New-Object System.Text.UTF8Encoding($false)))

          # 7z Archiv erstellen
          7z a "mod_data.7z" "./Mods" -xr!tmp

          $sfx = "C:\Program Files\7-Zip\7z.sfx"
          $out = "BSG_Pablo_Patch_$ver.exe"

          # Binäres Zusammenfügen
          & cmd.exe /c "copy /b `"$sfx`" + sfx_fixed.txt + mod_data.7z `"$out`""
          
          echo "FINAL_EXE=$out" >> $env:GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.FINAL_EXE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}