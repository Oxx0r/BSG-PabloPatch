name: Build Mod Installer

on:
  release:
    types: [published]

jobs:
  build-sfx:
    runs-on: windows-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Get Version from Tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update Config with Version
        shell: bash
        run: |
          # Ersetzt den Platzhalter {{VERSION}} in deiner sfx_config.txt durch den Release-Tag
          sed -i "s/{{VERSION}}/${{ steps.get_version.outputs.VERSION }}/g" sfx_config.txt

      - name: Download 7z SFX Module
        run: |
          # Holt das Modul, das die .exe-Oberfläche bereitstellt
          Invoke-WebRequest -Uri "https://github.com/chrislake/7zsfxmm/releases/download/1.7.1.3901/7zsd_All.7z" -OutFile "7zsd.7z"
          7z e 7zsd.7z -oSFX x64/7zsd_LZMA.sfx

      - name: Create Archive and SFX
        shell: pwsh
        run: |
          # 1. Daten packen:
          # Wir packen den Ordner 'Mods'. 
          # -xr!tmp schließt alle 'tmp' Ordner (und deren Inhalt wie 'bak', 'skill_cards' etc.) aus.
          7z a "mod_data.7z" "./Mods" -xr!tmp

          # 2. SFX-EXE zusammenbauen
          # Dateiname enthält die Version, z.B. BSG_Pablo_Patch_v1.1.exe
          $fileName = "BSG_Pablo_Patch_${{ steps.get_version.outputs.VERSION }}.exe"
          cmd /c "copy /b SFX\7zsd_LZMA.sfx + sfx_config.txt + mod_data.7z $fileName"
          
          # Dateiname für den nächsten Schritt (Upload) zwischenspeichern
          echo "FINAL_EXE=$fileName" >> $env:GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.FINAL_EXE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
